name: Update Earnings Data

on:
  schedule:
    # Run every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch: # Manual trigger
    inputs:
      reseed:
        description: 'Full re-seed: rescan full history for every ticker (use once after lowering MIN_SUE or to backfill missed trades).'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas tzdata curl_cffi lxml

      - name: Fetch earnings data
        env:
          # Scheduled runs leave this empty (normal incremental run); a manual
          # dispatch with the "reseed" box checked forces a one-off full backfill.
          FULL_RESEED: ${{ github.event.inputs.reseed }}
        run: python fetch_data.py

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json trades_log.json
          git diff --cached --quiet || git commit -m "Update earnings data $(date -u +%Y-%m-%d)"
          git push
